name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '18'
  DOTNET_VERSION: '9.0.x'

jobs:
  # Code Quality & Security
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Frontend Quality Checks
      - name: Install Frontend Dependencies
        working-directory: src/frontend
        run: npm ci

      - name: TypeScript Check
        working-directory: src/frontend
        run: npm run type-check

      - name: ESLint Check
        working-directory: src/frontend
        run: npm run lint

      - name: Prettier Check
        working-directory: src/frontend
        run: npm run format:check

      - name: Stylelint Check
        working-directory: src/frontend
        run: npm run lint:style

      # Backend Quality Checks
      - name: Restore .NET Dependencies
        working-directory: src/backend-simple/SterlingAuctions.SimpleAPI
        run: dotnet restore

      - name: .NET Format Check
        working-directory: src/backend-simple/SterlingAuctions.SimpleAPI
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: .NET Build
        working-directory: src/backend-simple/SterlingAuctions.SimpleAPI
        run: dotnet build --no-restore --configuration Release

      # Security Scanning
      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # Frontend Testing
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install Dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run Unit Tests
        working-directory: src/frontend
        run: npm run test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: src/frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  # Backend Testing
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sterling_auctions_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        working-directory: tests/backend/SterlingAuctions.Tests
        run: dotnet restore

      - name: Run Unit Tests
        working-directory: tests/backend/SterlingAuctions.Tests
        run: dotnet test --no-restore --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: tests/backend/SterlingAuctions.Tests/coverage/**/coverage.cobertura.xml
          flags: backend
          name: backend-coverage

  # E2E Testing
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Start Test Environment
        run: docker-compose -f docker/docker-compose.yml up -d

      - name: Wait for Services
        run: |
          timeout 300 bash -c 'until curl -f http://localhost:3000; do sleep 5; done'
          timeout 300 bash -c 'until curl -f http://localhost:5000/swagger; do sleep 5; done'

      - name: Run Playwright Tests
        working-directory: tests/e2e
        run: npx playwright test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/

  # Build and Push Images
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: github.event_name != 'pull_request'
    outputs:
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      backend-image: ${{ steps.meta-backend.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Frontend Image
      - name: Extract Frontend Metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, e2e-tests]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to ECS Staging
        run: |
          aws ecs update-service \
            --cluster sterling-auctions-staging \
            --service frontend-service \
            --force-new-deployment
          
          aws ecs update-service \
            --cluster sterling-auctions-staging \
            --service backend-service \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster sterling-auctions-staging \
            --services frontend-service backend-service

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, e2e-tests]
    if: github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to ECS Production
        run: |
          # Blue-green deployment strategy
          aws ecs update-service \
            --cluster sterling-auctions-production \
            --service frontend-service \
            --force-new-deployment
          
          aws ecs update-service \
            --cluster sterling-auctions-production \
            --service backend-service \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster sterling-auctions-production \
            --services frontend-service backend-service

  # Performance Testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://staging.sterling-auctions.com
            https://staging.sterling-auctions.com/admin
            https://staging.sterling-auctions.com/members
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Install Artillery
        run: npm install -g artillery@latest

      - name: Run Load Tests
        run: |
          artillery run tests/performance/load-test.yml \
            --target https://api-staging.sterling-auctions.com \
            --output performance-results.json

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: performance-results.json
