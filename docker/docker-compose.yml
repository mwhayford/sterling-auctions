version: '3.8'

services:
  # Redis Cache Service
  redis:
    image: redis:7.2-alpine
    container_name: sterling-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - sterling-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - REDIS_REPLICATION_MODE=master

  # Sterling Auctions API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: sterling-api
    restart: unless-stopped
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__Redis=redis:6379
      - RedisSettings__ConnectionString=redis:6379
      - RedisSettings__InstanceName=SterlingAuctions
      - RedisSettings__DefaultDatabase=0
      - RedisSettings__ConnectTimeout=10000
      - RedisSettings__SyncTimeout=10000
      - RedisSettings__AbortOnConnectFail=false
      - RedisSettings__RetryCount=5
      - RedisSettings__RetryDelayMs=2000
      - JwtSettings__SecretKey=sterling-auctions-super-secret-jwt-key-at-least-32-characters-long!
      - JwtSettings__Issuer=sterling-auctions
      - JwtSettings__Audience=sterling-auctions-users
      - JwtSettings__TokenExpirationInMinutes=60
      - JwtSettings__RefreshTokenExpirationInDays=7
      - GoogleOAuth__ClientId=${GOOGLE_CLIENT_ID:-your-google-client-id.apps.googleusercontent.com}
      - GoogleOAuth__ClientSecret=${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      - GoogleOAuth__RedirectUri=${GOOGLE_REDIRECT_URI:-https://localhost:5001/api/auth/google-callback}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sterling-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs:/app/logs

  # Redis Commander (Optional - Web UI for Redis)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sterling-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - sterling-network
    profiles:
      - tools

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: sterling-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
    networks:
      - sterling-network
    profiles:
      - production

volumes:
  redis_data:
    driver: local

networks:
  sterling-network:
    driver: bridge